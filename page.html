<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPSC Results</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0d; --surface: #111318; --border: #1e2330;
    --accent: #ff4d00; --accent2: #ffd100; --text: #e8eaf0;
    --muted: #5a6070; --green: #00e676;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'IBM Plex Sans', sans-serif; min-height: 100vh; }

  header {
    position: relative; background: var(--surface);
    border-bottom: 1px solid var(--border); padding: 26px 40px 0; overflow: hidden;
  }
  header::before {
    content: ''; position: absolute; top: 0; right: -20px; width: 300px; height: 100%;
    background: repeating-linear-gradient(-45deg, transparent, transparent 8px, rgba(255,77,0,0.06) 8px, rgba(255,77,0,0.06) 16px);
  }
  .logo-row { display: flex; align-items: baseline; gap: 12px; margin-bottom: 4px; }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 2.8rem; letter-spacing: 3px; line-height: 1; }
  .tag { font-family: 'IBM Plex Mono', monospace; font-size: 0.6rem; background: var(--accent); color: #000; padding: 2px 8px; border-radius: 2px; letter-spacing: 1px; font-weight: 600; }
  .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); letter-spacing: 2px; margin-bottom: 20px; }

  .tabs { display: flex; gap: 0; }
  .tab {
    font-family: 'Bebas Neue', sans-serif; font-size: 1rem; letter-spacing: 2px;
    padding: 12px 28px; cursor: pointer; border: 1px solid transparent;
    border-bottom: none; border-radius: 4px 4px 0 0; color: var(--muted);
    transition: color 0.15s; user-select: none; position: relative; top: 1px;
  }
  .tab:hover { color: var(--text); }
  .tab.active { background: var(--bg); border-color: var(--border); color: var(--accent2); }
  .tab-count {
    font-family: 'IBM Plex Mono', monospace; font-size: 0.58rem;
    background: rgba(255,255,255,0.07); color: var(--muted);
    padding: 2px 6px; border-radius: 2px; margin-left: 8px; letter-spacing: 0; vertical-align: middle;
  }
  .tab.active .tab-count { background: rgba(255,209,0,0.12); color: var(--accent2); }

  #scanBar {
    background: var(--surface); border-bottom: 1px solid var(--border);
    padding: 9px 40px; display: flex; align-items: center; gap: 12px;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted);
    transition: all 0.4s;
  }
  #scanBar.done { height: 0; padding: 0; overflow: hidden; border: none; opacity: 0; }
  #scanBar.err { border-color: var(--accent); }
  #scanBar.err #scanLabel { color: var(--accent); }
  .spinner { width: 11px; height: 11px; border: 2px solid var(--accent2); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
  #scanBar.err .spinner { display: none; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .page-inner { max-width: 1100px; margin: 0 auto; padding: 28px 40px; }

  .filters-row { display: flex; gap: 10px; margin-bottom: 14px; flex-wrap: wrap; }
  .search-wrap { position: relative; flex: 1; min-width: 180px; }
  .search-wrap input {
    width: 100%; background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text); font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.93rem; padding: 11px 14px 11px 40px; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .si { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); pointer-events: none; }
  .sport-sel {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; padding: 11px 14px;
    border-radius: 4px; outline: none; cursor: pointer; min-width: 180px;
  }
  .sport-sel:focus { border-color: var(--accent); }

  .list-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.67rem; color: var(--muted); margin-bottom: 12px; }
  .list-meta b { color: var(--accent2); font-weight: 400; }

  .match-list { display: flex; flex-direction: column; gap: 5px; }
  .mrow {
    background: var(--surface); border: 1px solid var(--border); border-radius: 4px;
    padding: 12px 18px; cursor: pointer; display: grid;
    grid-template-columns: 106px 1fr auto auto; align-items: center; gap: 14px;
    transition: border-color 0.15s, background 0.15s;
  }
  .mrow:hover { border-color: var(--accent); background: rgba(255,77,0,0.04); }
  .mrow-date { font-family: 'IBM Plex Mono', monospace; font-size: 0.67rem; }
  .mrow-name { font-weight: 600; font-size: 0.92rem; }
  .mrow-slots { font-family: 'IBM Plex Mono', monospace; font-size: 0.63rem; color: var(--muted); font-weight: 400; }
  .mrow-sport { font-family: 'IBM Plex Mono', monospace; font-size: 0.57rem; color: var(--muted); background: rgba(255,255,255,0.04); padding: 3px 7px; border-radius: 3px; white-space: nowrap; }
  .mrow-arrow { color: var(--muted); }
  .no-res { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; padding: 40px 0; text-align: center; }

  /* Results */
  #resultsPage { display: none; max-width: 1400px; margin: 0 auto; padding: 28px 40px; }
  #resultsPage.on { display: block; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px; cursor: pointer;
    font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted);
    border: 1px solid var(--border); border-radius: 3px; padding: 8px 16px;
    margin-bottom: 28px; background: transparent; letter-spacing: 1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .back-btn:hover { color: var(--accent); border-color: var(--accent); }
  .match-header { margin-bottom: 28px; border-left: 3px solid var(--accent); padding-left: 16px; }
  .match-title { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; margin-bottom: 4px; }
  .match-meta { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--muted); }
  .summary-row { display: grid; grid-template-columns: repeat(auto-fit,minmax(150px,1fr)); gap: 12px; margin-bottom: 28px; }
  .stat-box { background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 16px; }
  .stat-val { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 2px; color: var(--accent); line-height: 1; margin-bottom: 4px; }
  .stat-key { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .filter-bar { display: flex; gap: 16px; margin-bottom: 24px; flex-wrap: wrap; background: var(--surface); padding: 20px; border: 1px solid var(--border); border-radius: 4px; }
  .fg { display: flex; flex-direction: column; gap: 8px; flex: 1; min-width: 190px; }
  .fg label { font-family: 'IBM Plex Mono', monospace; font-size: 0.72rem; color: var(--accent2); letter-spacing: 1px; text-transform: uppercase; }
  .fg select { background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 12px; border-radius: 3px; font-size: 0.93rem; outline: none; width: 100%; cursor: pointer; }
  .fg select:focus { border-color: var(--accent); }
  .div-name { font-family: 'Bebas Neue', sans-serif; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent2); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .div-name .cnt { font-family: 'IBM Plex Mono', monospace; font-size: 0.68rem; color: var(--muted); background: rgba(255,255,255,0.04); padding: 3px 8px; border-radius: 3px; font-weight: 400; }
  .rtable { width: 100%; border-collapse: collapse; margin-bottom: 40px; font-size: 0.85rem; }
  .rtable thead { background: var(--bg); }
  .rtable th { font-family: 'IBM Plex Mono', monospace; font-size: 0.63rem; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; text-align: left; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .rtable th.n { text-align: right; }
  .rtable td { padding: 11px 14px; border-bottom: 1px solid rgba(30,35,48,0.6); vertical-align: middle; }
  .rtable td.n { text-align: right; font-family: 'IBM Plex Mono', monospace; font-size: 0.82rem; }
  .rtable tbody tr:hover { background: rgba(255,77,0,0.04); }
  .rank { font-family: 'Bebas Neue', sans-serif; font-size: 1.3rem; color: var(--muted); }
  tr:nth-child(1) .rank { color: #ffd700; }
  tr:nth-child(2) .rank { color: #c0c0c0; }
  tr:nth-child(3) .rank { color: #cd7f32; }
  .pct-cell { min-width: 130px; }
  .pbw { display: flex; align-items: center; gap: 8px; }
  .pb { flex: 1; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .pf { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; }
  .pl { font-family: 'IBM Plex Mono', monospace; font-size: 0.78rem; min-width: 50px; text-align: right; }
  .sname { font-weight: 600; display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
  .badge { font-size: 0.58rem; font-family: 'IBM Plex Mono', monospace; padding: 2px 5px; border-radius: 2px; border: 1px solid var(--border); color: var(--muted); }
  .no-res-t { padding: 32px; text-align: center; color: var(--muted); }

  #ov { display: none; position: fixed; inset: 0; background: rgba(10,11,13,0.88); z-index: 100; align-items: center; justify-content: center; flex-direction: column; gap: 16px; }
  #ov.on { display: flex; }
  .ls { width: 36px; height: 36px; border: 3px solid var(--accent2); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; }
  .ll { font-family: 'IBM Plex Mono', monospace; font-size: 0.75rem; color: var(--accent2); letter-spacing: 2px; }
  .cancel-btn {
    margin-top: 20px; background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 8px 24px; border-radius: 20px; font-family: 'IBM Plex Sans', sans-serif;
    font-size: 0.8rem; cursor: pointer; transition: all 0.2s; letter-spacing: 1px;
  }
  .cancel-btn:hover { 
    background: rgba(255,77,0,0.1); color: var(--accent); border-color: var(--accent); 
  }
  
  /* -- SHOOTER MODAL -- */
  #shooterModal { display: none; position: fixed; inset: 0; background: rgba(10,11,13,0.88); z-index: 200; align-items: center; justify-content: center; padding: 20px; opacity: 0; transition: opacity 0.2s; }
  #shooterModal.on { display: flex; opacity: 1; }
  .sm-content { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 28px; width: 100%; max-width: 480px; max-height: 85vh; overflow-y: auto; box-shadow: 0 10px 40px rgba(0,0,0,0.6); transform: translateY(15px); transition: transform 0.2s; }
  #shooterModal.on .sm-content { transform: translateY(0); }
  .sm-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 24px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .sm-title { font-family: 'Bebas Neue', sans-serif; font-size: 2.2rem; color: var(--text); line-height: 1; margin-bottom: 8px; letter-spacing: 1px; }
  .sm-close { background: none; border: none; color: var(--muted); font-size: 2.2rem; line-height: 0.8; cursor: pointer; transition: color 0.15s; }
  .sm-close:hover { color: var(--accent); }
  .sm-stage-list { display: flex; flex-direction: column; gap: 6px; }
  .sm-stage-row { display: flex; justify-content: space-between; align-items: center; padding: 14px 16px; background: rgba(255,255,255,0.02); border-radius: 3px; border-left: 2px solid var(--border); font-family: 'IBM Plex Sans', sans-serif; }
  .sm-stage-row:hover { border-left-color: var(--accent); background: rgba(255,77,0,0.04); }
  .sm-stg-name { color: var(--text); font-weight: 600; font-size: 0.95rem; letter-spacing: 0.5px; }
  .sm-stg-val { font-family: 'IBM Plex Mono', monospace; font-size: 1.1rem; font-weight: bold; }
  /* --- JÄMFÖR-FUNKTION DESIGN --- */
  #compareBar {
    position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%);
    background: var(--surface); border: 1px solid var(--accent);
    padding: 12px 24px; border-radius: 30px; display: flex; align-items: center; gap: 16px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.9); transition: bottom 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); z-index: 90;
  }
  #compareBar.show { bottom: 30px; }
  .cb-text { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--text); }
  .cb-btn { background: var(--accent); color: #000; border: none; padding: 8px 20px; border-radius: 20px; font-weight: bold; font-family: 'IBM Plex Sans'; cursor: pointer; transition: transform 0.1s; }
  .cb-btn:active { transform: scale(0.95); }
  .cb-btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }
  .cb-clear { background: transparent; color: var(--muted); border: 1px solid var(--muted); padding: 7px 16px; border-radius: 20px; font-family: 'IBM Plex Sans'; font-size: 0.8rem; cursor: pointer; }

  .chk-box { width: 18px; height: 18px; border: 2px solid var(--muted); border-radius: 4px; display: inline-block; vertical-align: middle; transition: all 0.15s; }
  .chk-box.checked { background: var(--accent); border-color: var(--accent); position: relative; }
  .chk-box.checked::after { content: ''; position: absolute; left: 5px; top: 1px; width: 4px; height: 9px; border: solid #000; border-width: 0 2px 2px 0; transform: rotate(45deg); }

  #compareModal { display: none; position: fixed; inset: 0; background: rgba(10,11,13,0.95); z-index: 300; overflow-y: auto; padding: 40px 20px; }
  #compareModal.on { display: block; }
  .cm-inner { max-width: 900px; margin: 0 auto; background: var(--surface); border: 1px solid var(--border); border-radius: 6px; padding: 30px; box-shadow: 0 10px 50px rgba(0,0,0,0.8); }
  .comp-table { width: 100%; border-collapse: collapse; margin-top: 10px; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; }
  .comp-table th, .comp-table td { padding: 12px 10px; border-bottom: 1px solid rgba(30,35,48,0.6); text-align: right; vertical-align: middle; }
  .comp-table th:first-child, .comp-table td:first-child { text-align: left; }
  .comp-table th { color: var(--muted); font-size: 0.7rem; letter-spacing: 1px; }
  .winner-cell { color: var(--accent2); font-weight: bold; }
  /* --- MOBILANPASSNING (RESPONSIVE DESIGN) --- */
  @media (max-width: 768px) {
    /* Header och Filter */
    header { padding: 16px 16px 0; }
    h1 { font-size: 2.2rem; }
    .tb { 
      flex-direction: column; 
      align-items: stretch; 
      gap: 12px; 
      margin-top: 16px; 
      padding-bottom: 16px;
    }
    .s-box, .s-box input, .s-box select { width: 100%; }
    
    /* Huvudtabellen (Resultaten) */
    #tv { padding: 16px 10px; }
    .rtable { 
      display: block; 
      overflow-x: auto; 
      white-space: nowrap; /* Tvingar tabellen att scrolla horisontellt istället för att krascha */
    }
    .rtable th, .rtable td { padding: 10px 8px; font-size: 0.85rem; }
    .sname { font-size: 0.9rem; }
    .pct-cell { min-width: 100px; }
    .pbw { width: 100%; }

    /* Modal / Popup-fönster (Skytt-detaljer & Jämför) */
    #shooterModal, #compareModal { padding: 20px 10px; }
    .sm-inner, .cm-inner { padding: 20px 15px; width: 100%; border-radius: 12px; }
    .sm-title { font-size: 1.5rem; }
    .sm-stg-val { font-size: 1.1rem; }
    .comp-table { display: block; overflow-x: auto; white-space: nowrap; }
    .comp-table th, .comp-table td { padding: 10px 8px; font-size: 0.8rem; }
    
    /* Jämför-baren i botten */
    #compareBar { 
      width: 95%; 
      flex-wrap: wrap; 
      justify-content: center; 
      padding: 12px; 
      bottom: -150px; 
      border-radius: 20px;
    }
    #compareBar.show { bottom: 15px; }
    .cb-text { width: 100%; text-align: center; margin-bottom: 8px; }
    .cb-btn, .cb-clear { flex: 1; text-align: center; padding: 10px; font-size: 0.9rem; }
  }

  /* Justering för ännu mindre skärmar (t.ex. äldre iPhones) */
  @media (max-width: 480px) {
    h1 { font-size: 1.8rem; }
    .sname { font-size: 0.85rem; }
    .badge { padding: 2px 4px; font-size: 0.6rem; }
  }
  
</style>
</head>
<body>

<header>
  <div class="logo-row"><h1>IPSC RESULTS</h1><span class="tag">LIVE</span></div>
  <div class="subtitle">SHOOT'N SCORE IT · SVENSKA MATCHER</div>
  <div class="tabs">
    <div class="tab active" id="tabU" onclick="switchTab('u')">KOMMANDE <span class="tab-count" id="cntU">–</span></div>
    <div class="tab" id="tabC" onclick="switchTab('c')">AVSLUTADE <span class="tab-count" id="cntC">–</span></div>
  </div>
</header>

<div id="scanBar"><div class="spinner"></div><span id="scanLabel">Hämtar matcher...</span></div>

<div class="tab-content active" id="panU">
  <div class="page-inner">
    <div class="filters-row">
      <div class="search-wrap">
        <span class="si"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input type="text" id="sqU" placeholder="Sök matchnamn..." oninput="renderU()" autocomplete="off"/>
      </div>
      <select class="sport-sel" id="spU" onchange="renderU()"><option value="">Alla sporter</option></select>
    </div>
    <div class="list-meta" id="metaU"></div>
    <div class="match-list" id="listU"></div>
  </div>
</div>

<div class="tab-content" id="panC">
  <div class="page-inner">
    <div class="filters-row">
      <div class="search-wrap">
        <span class="si"><svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input type="text" id="sqC" placeholder="Sök matchnamn..." oninput="renderC()" autocomplete="off"/>
      </div>
      <select class="sport-sel" id="spC" onchange="renderC()"><option value="">Alla sporter</option></select>
    </div>
    <div class="list-meta" id="metaC"></div>
    <div class="match-list" id="listC"></div>
  </div>
</div>

<div id="resultsPage">
  <button class="back-btn" onclick="goBack()">← TILLBAKA</button>
  <div id="rc"></div>
</div>

<div id="ov">
  <div class="ls"></div>
  <div class="ll">HÄMTAR RESULTAT...</div>
  <button class="cancel-btn" onclick="cancelFetch()">AVBRYT</button>
</div>

<div id="shooterModal">
  <div class="sm-content">
    <div class="sm-header">
      <div>
        <div class="sm-title" id="smName">SKYTT</div>
        <div id="smDiv">DIVISION</div>
      </div>
      <button class="sm-close" onclick="closeShooterModal()">&times;</button>
    </div>
    <div class="sm-stage-list" id="smStages"></div>
  </div>
</div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────────────────
const PROXIES = [
  url => `https://corsproxy.io/?url=${encodeURIComponent(url)}`,
  url => `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`,
];
const URL_U = 'https://shootnscoreit.com/regional-events/swe/';
const URL_C = 'https://shootnscoreit.com/completed-regional-events/swe/2026/';
const SSI   = 'https://shootnscoreit.com';

let matchesU = [], matchesC = [];
let activeTab = 'u', backTab = 'u';
window.CMD = null;

const today = new Date(); today.setHours(0,0,0,0);
const fmt   = d => d.toLocaleDateString('sv-SE',{year:'numeric',month:'short',day:'numeric'});

addEventListener('DOMContentLoaded', () => {
  loadAll();
});

// Global variabel för att hålla koll på pågående hämtning
let fetchAbortController = null;

// ─── FETCH WITH PROXY FALLBACK ────────────────────────────────────────────────
async function fetchHtml(url) {
  // Skapa en ny controller varje gång vi påbörjar en nedladdning
  fetchAbortController = new AbortController(); 
  const signal = fetchAbortController.signal;

  for (const mkProxy of PROXIES) {
    try {
      const r = await fetch(mkProxy(url), {
        headers: { Accept: 'text/html' },
        signal: signal // Skicka med signalen så vi kan avbryta anropet
      });
      if (!r.ok) continue;
      const text = await r.text();
      if (text.includes('<tr') || text.includes('<TR')) return text;
    } catch(e) {
      if (e.name === 'AbortError') {
        console.log('Nedladdning avbröts av användaren.');
        return null; // Returnera null om vi avbröt med flit
      }
    }
  }
  return null;
}

// ─── AVBRYT FUNKTION ──────────────────────────────────────────────────────────
function cancelFetch() {
  if (fetchAbortController) {
    fetchAbortController.abort(); // Säger åt webbläsaren att döda nätverksanropet
  }
  document.getElementById('ov').classList.remove('on'); // Dölj laddningsskärmen
}

async function loadAll() {
  const [hu, hc] = await Promise.all([fetchHtml(URL_U), fetchHtml(URL_C)]);

  if (hu) {
    matchesU = parseEvents(hu);
    fillSportSel('spU', matchesU);
    renderU();
  }
  if (hc) {
    matchesC = parseEvents(hc);
    fillSportSel('spC', matchesC);
    renderC();
  }

  if (!hu && !hc) {
    const bar = document.getElementById('scanBar');
    bar.className = 'err';
    document.getElementById('scanLabel').textContent = '✕ Kunde inte hämta matcher – kontrollera nätverksanslutningen/proxyn';
    return;
  }
  setTimeout(() => document.getElementById('scanBar').className = 'done', 400);
}

// ─── PARSE EVENTS PAGE ────────────────────────────────────────────────────────
function parseEvents(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const out = [];

  doc.querySelectorAll('table tr').forEach(row => {
    const tds = row.querySelectorAll('td');
    if (tds.length < 4) return;

    const evCell    = tds[1];
    const sportCell = tds[3];
    const link      = evCell.querySelector('a[href*="/event/"]');
    if (!link) return;

    const href     = link.getAttribute('href') || '';
    const linkText = link.textContent.trim();
    const rowText  = row.textContent.trim().replace(/\s+/g, ' '); 

    let eType = null, eId = null;
    const dm = href.match(/\/event\/(\d+)\/(\d+)\//);
    if (dm) {
      eType = dm[1]; eId = dm[2];
    } else {
      const tm = href.match(/\/event\/(\d+)\/([A-Za-z0-9+/=]{20,})\//);
      if (tm) {
        eType = tm[1];
        try {
          const pad = tm[2] + '==';
          const dec = atob(pad);                      
          const nm  = dec.match(/^(\d+)\./);
          if (nm) eId = nm[1];
        } catch(_) {}
      }
    }
    if (!eType || !eId) return;

    const liveUrl = `${SSI}/event/${eType}/${eId}/live-scores/`;

    let parsedDate = null;
    const dateRxUS = /\b([A-Z][a-z]+\.?)\s+(\d{1,2}),\s+(\d{4})\b/i; 
    const dateRxISO = /\b(\d{4})-(\d{2})-(\d{2})\b/; 

    const dmISO = rowText.match(dateRxISO);
    const dmUS = rowText.match(dateRxUS);

    if (dmISO) {
      parsedDate = new Date(`${dmISO[1]}-${dmISO[2]}-${dmISO[3]}`);
    } else if (dmUS) {
      parsedDate = new Date(`${dmUS[1].replace('.','').replace('Sept','Sep')} ${dmUS[2]}, ${dmUS[3]}`);
    } else {
      parsedDate = new Date();
    }

    if (!isNaN(parsedDate)) parsedDate.setHours(0,0,0,0);

    const name = linkText
      .replace(dateRxUS, '')
      .replace(/\|\s*\d+\/\d+\s*$/, '')
      .replace(/premium\s*$/i, '')
      .trim();
    if (!name) return;

    const sport = sportCell.textContent.trim();
    const slotM = rowText.match(/(\d+)\/(\d+)\s*$/);
    const slots = slotM ? `${slotM[1]}/${slotM[2]}` : '';

    out.push({name, date: parsedDate, dateStr: fmt(parsedDate), sport, liveUrl, slots, eId});
  });

  out.sort((a,b) => b.date - a.date);
  return out;
}

// ─── SSI PARSER (Uppdaterad för att spara detaljerade träffar/stages) ──────────
function parseSSI(html, sourceUrl) {
  const doc = new DOMParser().parseFromString(html, 'text/html');
  const em  = new Map();
  let title = '';
  for (const s of ['h1','.match-name','h2','title']) {
    const el = doc.querySelector(s);
    if (el) { title = el.textContent.trim().replace(/\s*\|\s*Shoot'?n?\s*Score\s*It\s*/gi,'').replace('Live Scores - ','').trim(); if (title) break; }
  }
  title = title || 'Match Results';

  const knownDivs = [
    'PRODUCTION OPTICS LIGHT', 'PRODUCTION OPTICS', 'OPTICS LIGHT', 'OPTICS', 'PRODUCTION',
    'PISTOL CALIBER CARBINE', 'PCC',
    'SEMI AUTO OPEN', 'SEMI AUTO STANDARD',
    'MANUAL ACTION OPEN', 'MANUAL ACTION STANDARD',
    'MINI RIFLE OPEN', 'MINI RIFLE STANDARD', 'MINI RIFLE',
    'STANDARD MANUAL', 'STANDARD',
    'OPEN', 'CLASSIC', 'REVOLVER', 'MODIFIED'
  ];

  const divs = [];
  doc.querySelectorAll('h2,h3,h4,.result-header,[class*="division-name"],[class*="div-name"],[class*="cat-name"],.stage-name').forEach(h => {
    const ht = h.textContent.trim();
    let table=null, next=h.nextElementSibling;
    for(let i=0;i<5&&next;i++){if(next.tagName==='TABLE'){table=next;break;}if(next.querySelector('table')){table=next.querySelector('table');break;}next=next.nextElementSibling;}
    if(!table&&h.closest('.stage-section'))table=h.closest('.stage-section').querySelector('table');
    if(!table)return;
    const comps=ptable(table,em); 

    const up = ht.toUpperCase();
    let guessedDiv = null;
    for (let d of knownDivs) { if (up.includes(d)) { guessedDiv = d; break; } }
    comps.forEach(c => { if(!c.div && guessedDiv) c.div = guessedDiv; });
    if(comps.length)divs.push({name:ht,competitors:comps});
  });

  if(!divs.length){
    doc.querySelectorAll('table.live-table,table.table,table').forEach((table,i)=>{
      const comps=ptable(table,em); if(!comps.length)return;
      let name=null,anc=table.parentElement;
      for(let d=0;d<5&&anc;d++){const h=anc.querySelector('h2,h3,h4,.title,.header,.stage-name');if(h){name=h.textContent.trim();break;}anc=anc.parentElement;}
      divs.push({name:name||`Stage/Division ${i+1}`,competitors:comps});
    });
  }
  
  const seen=new Set();
  const ud=divs.filter(d=>{const k=d.name+d.competitors.length;if(seen.has(k))return false;seen.add(k);return true;});
  const us=new Set(); ud.forEach(d=>d.competitors.forEach(c=>us.add(c.name.trim().toLowerCase())));
  const om=new Map();
  
  ud.forEach(stage=>{
    if(!stage.competitors.some(c=>c.hf!==null))return;
    let mH=0,mS=0; stage.competitors.forEach(c=>{if(c.hf&&c.hf>mH)mH=c.hf;if(c.stageMaxPts&&c.stageMaxPts>mS)mS=c.stageMaxPts;});
    stage.competitors.forEach(c=>{
      const k=c.name.trim().toLowerCase();
      
      if(!om.has(k))om.set(k,{name:c.name,pts:0,hf:null,time:null,stages:[],div:null,cat:null, detailedStages: []});
      const s=om.get(k); 
      
      if(c.div) s.div = c.div; 
      let stagePts = (mH>0&&c.hf!==null&&mS>0)?((c.hf/mH)*mS):(c.pts||0);
      s.pts += stagePts;
      
      s.detailedStages.push({
         stageName: stage.name,
         hf: c.hf,
         time: c.time,
         pts: c.pts, 
         hits: c.hits,
         pct: (mH>0 && c.hf!==null) ? (c.hf/mH)*100 : 0,
         matchPts: stagePts,
         stageMaxPts: mS // NYTT: Spara maxpoängen per stage för framtida omräkning
      });
    });
  });
  
  const ov=Array.from(om.values()).sort((a,b)=>b.pts-a.pts);
  if(ov.length)ud.unshift({name:'Overall Match Results',competitors:ov});
  return {title,divisions:ud,totalCompetitors:us.size,sourceUrl};
}

function ptable(table,apiMap){
  const rows=[];let hr=null;
  const trs=Array.from(table.querySelectorAll('tr'));
  for(let tr of trs){const c=Array.from(tr.querySelectorAll('th,td'));const t=tr.textContent.toLowerCase();if(c.length>=3&&(t.includes('name')||t.includes('competitor')||t.includes('shooter')||t.includes('factor')||t.includes('hf')||t.includes('pts')||t.includes('time')||t.includes('div'))){hr=tr;break;}}
  const headers=hr?Array.from(hr.querySelectorAll('th,td')).map(c=>c.textContent.trim().toLowerCase()):[];
  const isSsi=headers.length===0||headers.every(h=>h==='');
  const sc=[];headers.forEach((h,i)=>{if(/^(stage\s*|stg\s*)?\d+$/.test(h.replace(/[^a-z0-9 ]/gi,'').trim()))sc.push(i);});
  let ph=false;
  
  trs.forEach(tr=>{
    if(tr===hr){ph=true;return;}if(!ph&&!isSsi)return;
    const cells=Array.from(tr.querySelectorAll('td,th'));if(cells.length<3)return;
    const texts=cells.map(c=>c.textContent.trim());
    if(texts.some(t=>/^(name|shooter|place|rank|%|competitor|hf|hit factor)$/i.test(t)))return;
    
    let name=null,hf=null,pts=null,time=null,compDiv=null,compCat=null,smp=0;
    let hits = null; // För att spara A,C,D,M,PT
    
    const ie=cells.length>=4&&/p\s*\d+\|/.test(texts[3]);
    
    if(!isSsi&&!ie){
      const idx={name:fi(headers,/name|shooter|competitor/),pts:fir(headers,/pts|point|score/),time:fi(headers,/time|tid/),hf:fi(headers,/hf|hit.*factor|factor/)};
      name=idx.name>=0?texts[idx.name]:texts.reduce((b,t)=>(t.length>(b||'').length&&!/^[\d.,% \-]+$/.test(t)&&t.length>2)?t:b,'');
      if(idx.hf>=0&&texts[idx.hf])hf=parseFloat(texts[idx.hf].replace(',','.'));
      if(idx.pts>=0&&texts[idx.pts]){const m=texts[idx.pts].match(/^(-?\d+(\.\d+)?)/);if(m)pts=parseFloat(m[1]);}
      if(idx.time>=0&&texts[idx.time])time=parseFloat(texts[idx.time].replace(',','.'));
    }else{
      if(texts[0]){const v=parseFloat(texts[0].replace(',','.'));if(!isNaN(v))hf=v;}
      name=texts[1];
      if(texts[2]){const v=parseFloat(texts[2].replace(',','.'));if(!isNaN(v))time=v;}
      if(texts[3]){
        const m=texts[3].match(/^(-?\d+(\.\d+)?)/);if(m)pts=parseFloat(m[1]);
        // HÄMTA A,C,D,MISS,PT direkt från Shoot'n Score It texten
        const hm=texts[3].match(/p\s+(\d+)\|(\d+)\|(\d+)\|(\d+)\|(\d+)/);
        if(hm){
           smp=(parseInt(hm[1])+parseInt(hm[2])+parseInt(hm[3])+parseInt(hm[4]))*5;
           hits = { a: parseInt(hm[1]), c: parseInt(hm[2]), d: parseInt(hm[3]), m: parseInt(hm[4]), pt: parseInt(hm[5]) };
        }
      }
    }
    
    if(!name||name.length<2||/^[\d.,%]+$/.test(name))return;

    const knownDivs = [
      'PRODUCTION OPTICS LIGHT', 'PRODUCTION OPTICS', 'OPTICS LIGHT', 'OPTICS', 'PRODUCTION',
      'PISTOL CALIBER CARBINE', 'PCC',
      'SEMI AUTO OPEN', 'SEMI AUTO STANDARD',
      'MANUAL ACTION OPEN', 'MANUAL ACTION STANDARD',
      'MINI RIFLE OPEN', 'MINI RIFLE STANDARD', 'MINI RIFLE',
      'STANDARD MANUAL', 'STANDARD',
      'OPEN', 'CLASSIC', 'REVOLVER', 'MODIFIED'
    ];
    
    if(!compDiv) {
      for(let d of knownDivs) {
        const regex = new RegExp(`\\b${d}\\b`, 'i');
        if(regex.test(name)) {
          compDiv = (d === 'PISTOL CALIBER CARBINE') ? 'PCC' : d;
          const replaceReg = new RegExp(`[\\-\\(\\s]*\\b${d}\\b[\\-\\)\\s]*`, 'i');
          name = name.replace(replaceReg, ' ').trim();
          name = name.replace(/^[-]+|[-]+$/g, '').trim(); 
          break; 
        }
      }
    }

    if(compCat){const cc=(Array.isArray(compCat)?compCat.join(', '):compCat).toLowerCase().trim();if(['regular','none','null'].includes(cc))compCat=null;}
    const stages=sc.map(ci=>{const v=parseFloat((texts[ci]||'').replace(',','.'));return isNaN(v)?0:v;});
    
    // Skickar in detailed hits till den sparade raden
    rows.push({name,pts,hf,time,stages,stageMaxPts:smp,div:compDiv,cat:compCat, hits:hits});
  });
  return rows;
}
function fi(a,r){return a.findIndex(h=>r.test(h));}
function fir(a,r){for(let i=a.length-1;i>=0;i--)if(r.test(a[i]))return i;return -1;}

function renderBaseUI(){
  const data = window.CMD;
  let ad = new Set();
  
  data.divisions.forEach(d => {
    d.competitors.forEach(c => {
      if(c.div && c.div !== 'null') {
        ad.add(String(c.div).trim().toUpperCase());
      }
    });
  });

  const so = data.divisions.map((d,i) => `<option value="${i}">${esc(d.name)}</option>`).join('');
  const doo = [...ad].sort().map(d => `<option value="${esc(d)}">${esc(d)}</option>`).join('');
  
  document.getElementById('rc').innerHTML=`
    <div class="match-header">
      <div class="match-title">${esc(data.title)}</div>
      <div class="match-meta">${esc(data.sourceUrl)} · ${new Date().toLocaleString('sv-SE')}</div>
    </div>
    <div class="summary-row">
      <div class="stat-box"><div class="stat-val">${data.totalCompetitors}</div><div class="stat-key">Skyttar</div></div>
      <div class="stat-box"><div class="stat-val">${data.divisions.length}</div><div class="stat-key">Stages</div></div>
    </div>
    <div class="filter-bar">
      <div class="fg"><label>Stage / Resultat</label><select id="sfS" onchange="af()">${so}</select></div>
      <div class="fg"><label>Division</label><select id="sfD" onchange="af()"><option value="">Alla</option>${doo}</select></div>
    </div>
    <div id="tv"></div>`;
    
  af();
}

function af(){
  const data = window.CMD; 
  if(!data) return;
  
  const si = document.getElementById('sfS').value;
  const dv = document.getElementById('sfD').value;
  const stage = data.divisions[si]; 
  if(!stage) return;
  
  let f = stage.competitors.filter(c => {
    const d = String(c.div || '').trim().toUpperCase();
    return (!dv || d === dv.toUpperCase());
  });
  
  const isOverall = stage.name.toLowerCase().includes('overall');

  if(isOverall) {
    // 1. Hitta bästa Hit Factor PER STAGE inom den filtrerade divisionen
    const stageMaxes = {};
    f.forEach(c => {
      if(c.detailedStages) {
        c.detailedStages.forEach(ds => {
          if(!stageMaxes[ds.stageName]) stageMaxes[ds.stageName] = { maxHF: 0, maxPts: ds.stageMaxPts || 0 };
          if(ds.hf !== null && ds.hf > stageMaxes[ds.stageName].maxHF) stageMaxes[ds.stageName].maxHF = ds.hf;
          if(ds.stageMaxPts && ds.stageMaxPts > stageMaxes[ds.stageName].maxPts) stageMaxes[ds.stageName].maxPts = ds.stageMaxPts;
        });
      }
    });

    // 2. Räkna om matchpoängen för varje skytt utifrån den nya måttstocken
    f.forEach(c => {
      let newTotal = 0;
      if(c.detailedStages) {
        c.detailedStages.forEach(ds => {
          const sm = stageMaxes[ds.stageName];
          let sp = 0;
          if(sm && sm.maxHF > 0 && ds.hf !== null && sm.maxPts > 0) {
            sp = (ds.hf / sm.maxHF) * sm.maxPts;
            ds.dynPct = (ds.hf / sm.maxHF) * 100;
          } else {
            sp = ds.pts || 0;
            ds.dynPct = ds.pct || 0;
          }
          ds.dynMatchPts = sp; // Spara dynamiska stage-poäng
          newTotal += sp;
        });
      }
      c.dynTotalPts = newTotal;
    });

    // 3. Sortera och sätt den nya %-satsen för hela matchen
    f.sort((a,b) => (b.dynTotalPts || 0) - (a.dynTotalPts || 0));
    const mx = f.length ? f[0].dynTotalPts : 0;
    f.forEach((c,i) => {
      c.vp = i + 1;
      c.dynPct = mx > 0 ? (c.dynTotalPts / mx) * 100 : 0;
    });

  } else {
    // Om det bara är en specifik Stage-vy
    f.sort((a,b) => {
      const va = a.hf !== null ? a.hf : (a.pts || 0);
      const vb = b.hf !== null ? b.hf : (b.pts || 0);
      return vb - va;
    });
    const mx = f.length ? (f[0].hf !== null ? f[0].hf : f[0].pts) : 0;
    f.forEach((c,i) => {
      c.vp = i + 1;
      const v = c.hf !== null ? c.hf : c.pts;
      c.dynPct = mx > 0 ? (v / mx) * 100 : 0;
      c.dynTotalPts = c.pts; 
    });
  }
  
  rtv(stage.name, f, isOverall);
}

// ORIGINALBORDET ÄR TILLBAKA HÄR
function rtv(vn, competitors, isOverall){
  window.currentRenderedCompetitors = competitors; 
  if(!window.compareList) window.compareList = []; 
  
  const el = document.getElementById('tv');
  if(!competitors.length){el.innerHTML=`<div class="no-res-t">Inga skyttar matchar filtret.</div>`;return;}
  
  const isS = competitors.some(c => c.hf !== null || c.time !== null);
  const gsc = window.CMD.divisions.reduce((m,d) => Math.max(m, d.competitors.reduce((m2,c) => Math.max(m2, (c.stages||[]).length), 0)), 0);
  
  let h=`<div class="div-name">${esc(vn)}<span class="cnt">${competitors.length} SKYTTAR</span></div>
  <table class="rtable"><thead><tr><th style="width:40px"></th><th>PLATS</th><th>SKYTT</th>`;
  
  if(isS) {
    h+=`<th class="n">HF</th><th class="n">TID</th><th class="n">POÄNG</th><th class="pct-cell">STAGE %</th>`;
  } else {
    h+=`<th class="n">MATCH POÄNG</th><th class="pct-cell">MATCH %</th>`;
  }
  
  h+=`</tr></thead><tbody>`;
  
  competitors.forEach((c,ri) => {
    let pctVal = c.dynPct !== undefined ? c.dynPct : (c.pct || 0);
    const bw = Math.min(100, pctVal), ps = pctVal > 0 ? pctVal.toFixed(2)+'%' : '0.00%';
    const ptsVal = isOverall ? (c.dynTotalPts !== undefined ? c.dynTotalPts : c.pts) : (c.pts != null ? c.pts : 0);
    const pts = ptsVal != null ? (Number.isInteger(ptsVal) ? ptsVal : ptsVal.toFixed(4)) : '—';
    const hfs = c.hf != null ? c.hf.toFixed(4) : '—', tms = c.time != null ? c.time.toFixed(2) : '—';
    const gc = ri===0 ? ' style="color:#ffd700"' : ri===1 ? ' style="color:#c0c0c0"' : ri===2 ? ' style="color:#cd7f32"' : '';
    
    let badges = '';
    if(c.div && c.div !== 'null') badges += `<span class="badge">${esc(c.div)}</span>`;
    if(c.cat && c.cat !== 'null') c.cat.split(',').forEach(p=>{badges+=`<span class="badge" style="border-color:var(--accent);color:var(--accent)">${esc(p.trim())}</span>`;});
    
    const isChecked = window.compareList.some(s => s.name === c.name);
    
    h+=`<tr style="cursor:pointer;" onclick="openShooterModal(${ri})">
      <td onclick="event.stopPropagation(); toggleCompare(${ri})">
        <div class="chk-box ${isChecked ? 'checked' : ''}"></div>
      </td>
      <td><span class="rank"${gc}>${c.vp}</span></td><td><div class="sname">${esc(c.name)} ${badges}</div></td>`;
    
    if(isS) {
      h+=`<td class="n" style="color:var(--accent2);font-weight:bold">${hfs}</td><td class="n">${tms}</td><td class="n">${pts}</td>
      <td class="pct-cell"><div class="pbw"><div class="pb"><div class="pf" style="width:${bw}%"></div></div><span class="pl">${ps}</span></div></td>`;
    } else {
      h+=`<td class="n" style="color:var(--accent2);font-weight:bold">${pts}</td>
      <td class="pct-cell"><div class="pbw"><div class="pb"><div class="pf" style="width:${bw}%"></div></div><span class="pl">${ps}</span></div></td>`;
    }
    h+=`</tr>`;
  });
  h+=`</tbody></table>`;
  el.innerHTML=h;
}

// ─── UPPGRADERAT POP-UP (MODAL) MED TRÄFFAR OCH TID ─────────────────────────
function openShooterModal(idx) {
  const c = window.currentRenderedCompetitors[idx];
  if(!c) return;
  
  document.getElementById('smName').textContent = c.name;
  let badges = '';
  if(c.div && c.div !== 'null') badges += `<span class="badge">${esc(c.div)}</span>`;
  if(c.cat && c.cat !== 'null') c.cat.split(',').forEach(p => {badges += `<span class="badge" style="border-color:var(--accent);color:var(--accent)">${esc(p.trim())}</span>`;});
  document.getElementById('smDiv').innerHTML = badges || '—';

  let details = c.detailedStages || [];
  if (details.length === 0 && window.CMD.divisions.length > 0) {
    const overallDiv = window.CMD.divisions.find(d => d.name.toUpperCase().includes('OVERALL'));
    if (overallDiv) {
       const oc = overallDiv.competitors.find(comp => comp.name === c.name);
       if (oc && oc.detailedStages) details = oc.detailedStages;
    }
  }

  const sl = document.getElementById('smStages');
  if(details && details.length > 0) {
    let totalMatchPts = 0;
    sl.innerHTML = details.map(d => {
      // Använd de nya dynamiska värdena om de finns
      let currentDynPct = d.dynPct !== undefined ? d.dynPct : d.pct;
      let currentDynPts = d.dynMatchPts !== undefined ? d.dynMatchPts : d.matchPts;

      totalMatchPts += (currentDynPts || 0);
      
      let hitStr = d.hits 
          ? `A: ${d.hits.a} &nbsp; C: ${d.hits.c} &nbsp; D: ${d.hits.d} &nbsp; M: ${d.hits.m}` + (d.hits.pt > 0 ? ` &nbsp; <span style="color:var(--accent)">PT: ${d.hits.pt}</span>` : '') 
          : 'Inga träffdata';
          
      let pctStr = currentDynPct > 0 ? currentDynPct.toFixed(2) + '%' : '0.00%';
      let timeStr = d.time ? d.time.toFixed(2) + 's' : '—';
      let rawPtsStr = d.pts !== null ? d.pts : '0';
      let hfStr = d.hf !== null ? d.hf.toFixed(4) : '—';
      let stagePtsStr = currentDynPts ? currentDynPts.toFixed(4) : '0.0000';

      const isZero = (currentDynPts === 0 || !d.time);

      return `<div class="sm-stage-row" ${isZero ? 'style="opacity:0.4"' : ''}>
                <div style="flex:1">
                  <div class="sm-stg-name">${esc(d.stageName)}</div>
                  <div style="font-size:0.75rem; color:var(--muted); margin-top:6px; font-family:'IBM Plex Mono', monospace;">
                    ${hitStr}
                  </div>
                  <div style="font-size:0.75rem; color:var(--muted); margin-top:4px; font-family:'IBM Plex Mono', monospace;">
                    PTS: <span style="color:var(--text)">${rawPtsStr}</span> &nbsp;•&nbsp; TID: <span style="color:var(--text)">${timeStr}</span> &nbsp;•&nbsp; HF: <span style="color:var(--text)">${hfStr}</span>
                  </div>
                </div>
                <div style="text-align:right">
                  <div class="sm-stg-val" style="color:var(--accent2);">${pctStr}</div>
                  <div style="font-size:0.8rem; color:var(--text); margin-top:6px; font-family:'IBM Plex Mono', monospace;">${stagePtsStr} stg p</div>
                </div>
              </div>`;
    }).join('');
    
    sl.innerHTML += `<div class="sm-stage-row" style="margin-top:12px; border-left-color:var(--accent2); background:rgba(255,209,0,0.08);">
                        <div class="sm-stg-name" style="color:var(--accent2); font-weight:bold;">TOTAL MATCHPOÄNG</div>
                        <div class="sm-stg-val" style="color:var(--accent2); font-size:1.1rem;">${totalMatchPts.toFixed(4)}</div>
                     </div>`;
  } else {
    sl.innerHTML = `<div class="no-res-t">Ingen stage-data kunde hämtas för denna skytt.</div>`;
  }
  
  document.getElementById('shooterModal').classList.add('on');
}

// Funktion för att stänga fönstret
function closeShooterModal() {
  const modal = document.getElementById('shooterModal');
  if (modal) {
    modal.classList.remove('on');
  }
}

// Stäng fönstret om man klickar på den mörka bakgrunden utanför rutan
window.addEventListener('click', function(event) {
  const modal = document.getElementById('shooterModal');
  if (event.target === modal) {
    closeShooterModal();
  }
});


function esc(s){return !s?'':String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

// ─── JÄMFÖR SKYTTAR FUNKTIONER ─────────────────────────────────────────────
window.compareList = [];

function toggleCompare(idx) {
  const compInView = window.currentRenderedCompetitors[idx];
  if(!compInView) return;
  const name = compInView.name;

  const listIdx = window.compareList.findIndex(s => s.name === name);
  if (listIdx >= 0) {
    window.compareList.splice(listIdx, 1); // Ta bort om den redan finns
  } else {
    if (window.compareList.length >= 5) {
      alert("Du kan max jämföra 5 skyttar samtidigt.");
      return;
    }
    // Hitta från Overall
    const overallDiv = window.CMD.divisions.find(d => d.name.toUpperCase().includes('OVERALL'));
    let comp = null;
    if (overallDiv) comp = overallDiv.competitors.find(c => c.name === name);
    if (!comp) comp = compInView; 
    
    if(comp) window.compareList.push(comp);
  }
  
  af(); // Laddar om tabellen så kryssrutan uppdateras
  updateCompareBar();
}

function updateCompareBar() {
  let bar = document.getElementById('compareBar');
  if(!bar) {
     bar = document.createElement('div');
     bar.id = 'compareBar';
     document.body.appendChild(bar);
  }
  if(window.compareList.length > 0) {
    bar.innerHTML = `
      <div class="cb-text"><b>${window.compareList.length}</b> av 5 skyttar valda</div>
      <button class="cb-btn" onclick="openCompareModal()" ${window.compareList.length < 2 ? 'disabled' : ''}>JÄMFÖR</button>
      <button class="cb-clear" onclick="clearCompare()">RENSA</button>
    `;
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

function clearCompare() {
  window.compareList = [];
  af();
  updateCompareBar();
}

function openCompareModal() {
  if (window.compareList.length < 2) return;
  
  let modal = document.getElementById('compareModal');
  if(!modal) {
     modal = document.createElement('div');
     modal.id = 'compareModal';
     document.body.appendChild(modal);
  }

  // 1. Hitta gemensamma stages (där ALLA valda har ett resultat > 0 på tid eller poäng)
  let commonStageNames = [];
  const firstShooter = window.compareList[0];
  
  if(firstShooter.detailedStages) {
     firstShooter.detailedStages.forEach(ds => {
        const allShot = window.compareList.every(shooter => {
           const sds = (shooter.detailedStages || []).find(x => x.stageName === ds.stageName);
           // Måste finnas och ha en tid registrerad för att räknas som skjuten
           return sds && (sds.time > 0 || sds.hf > 0 || sds.pts > 0); 
        });
        if(allShot) commonStageNames.push(ds.stageName);
     });
  }

  // 2. Bygg datan och summera resultaten
  let totals = window.compareList.map(s => ({ name: s.name, totalPts: 0, div: s.div }));
  let stagesHtml = '';
  
  commonStageNames.forEach(stgName => {
     stagesHtml += `<tr><td style="font-weight:bold; color:var(--text); text-align:left;">${stgName}</td>`;
     
     // Hitta vem som sköt stagen bäst i jämförelsen
     let maxHf = 0;
     window.compareList.forEach(s => {
        const sds = s.detailedStages.find(x => x.stageName === stgName);
        if(sds && sds.hf > maxHf) maxHf = sds.hf;
     });

     window.compareList.forEach((s, idx) => {
        const sds = s.detailedStages.find(x => x.stageName === stgName);
        // Använd dynMatchPts om det finns (från ditt filter), annars vanliga matchPts
        const stgPts = sds ? (sds.dynMatchPts !== undefined ? sds.dynMatchPts : sds.matchPts) : 0; 
        totals[idx].totalPts += stgPts;
        
        const hf = sds && sds.hf ? sds.hf.toFixed(4) : '0.0000';
        const ptsStr = stgPts ? stgPts.toFixed(2) : '0.00';
        const isWinner = sds && sds.hf === maxHf && maxHf > 0;
        
        stagesHtml += `<td class="${isWinner ? 'winner-cell' : ''}">${hf} HF<br><span style="font-size:0.65rem; color:var(--muted)">${ptsStr} p</span></td>`;
     });
     stagesHtml += `</tr>`;
  });

  // Hitta vem som har högst totalpoäng av dessa gemensamma stages
  let maxTotal = 0;
  totals.forEach(t => { if(t.totalPts > maxTotal) maxTotal = t.totalPts; });

  // Bygg rubriker
  let headersHtml = `<th style="text-align:left;">STAGES (${commonStageNames.length} gemensamma)</th>`;
  window.compareList.forEach(s => {
     headersHtml += `<th><div style="color:var(--text); font-family:'Bebas Neue', sans-serif; font-size:1.4rem; letter-spacing:1px;">${s.name.split(' ')[0]}</div><div style="font-size:0.6rem; color:var(--muted)">${s.div||''}</div></th>`;
  });

  // Bygg totalrad
  let totalsHtml = `<tr style="background:rgba(255,209,0,0.05); border-top:2px solid var(--accent2);"><td style="font-weight:bold; color:var(--accent2); font-size:1.1rem; text-align:left;">TOTAL MATCH %</td>`;
  window.compareList.forEach((s, idx) => {
     const t = totals[idx].totalPts;
     const pct = maxTotal > 0 ? ((t / maxTotal) * 100).toFixed(2) : '0.00';
     totalsHtml += `<td style="color:var(--accent2); font-weight:bold; font-size:1.2rem;">
       ${pct}%<br>
       <span style="font-size:0.75rem; color:var(--muted); font-weight:normal;">${t.toFixed(4)} p</span>
     </td>`;
  });
  totalsHtml += `</tr>`;

  modal.innerHTML = `
    <div class="cm-inner">
      <div class="sm-header" style="margin-bottom:10px;">
        <div class="sm-title">JÄMFÖR SKYTTAR</div>
        <button class="sm-close" onclick="closeCompareModal()">&times;</button>
      </div>
      <div style="color:var(--muted); font-size:0.85rem; margin-bottom: 24px; font-style:italic;">
        Visar endast resultat för stationer där <b>alla</b> de valda skyttarna har skjutit.
      </div>
      <div style="overflow-x:auto;">
        <table class="comp-table">
          <thead><tr>${headersHtml}</tr></thead>
          <tbody>
            ${stagesHtml}
            ${totalsHtml}
          </tbody>
        </table>
      </div>
    </div>
  `;
  
  modal.classList.add('on');
}

function closeCompareModal() {
  const modal = document.getElementById('compareModal');
  if(modal) modal.classList.remove('on');
}

// Stäng jämför-fönstret om man klickar utanför
window.addEventListener('click', function(event) {
  const modal = document.getElementById('compareModal');
  if (event.target === modal) {
    closeCompareModal();
  }
});

</script>
